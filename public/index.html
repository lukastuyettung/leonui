<!DOCTYPE html><html lang='vi'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Cô Hà leo đỉnh Olympia</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial;background:linear-gradient(135deg,#efd8ff,#dbeafe)}.top{text-align:center;padding:18px}.home{background:#7c3aed;color:#fff;padding:12px 28px;border:none;border-radius:30px;font-size:18px;cursor:pointer}.wrap{display:flex;justify-content:center}.container{position:relative;width:760px;background:#fff;border-radius:24px;padding:28px 34px;box-shadow:0 12px 30px rgba(0,0,0,.15)}.chibi{position:absolute;top:25px;width:170px}.left{right:100%;margin-right:-45px}.right{left:100%;margin-left:-45px}h1{text-align:center;color:#7c3aed}.info{display:flex;justify-content:space-between;font-weight:bold}.progress{height:10px;background:#eee;border-radius:10px;overflow:hidden;margin:18px 0}.bar{height:100%;background:#7c3aed;width:0}#question{font-size:28px;font-weight:bold;margin:20px 0}.answers{display:flex;flex-direction:column;gap:14px}.answer{padding:16px;border:none;border-radius:14px;background:#f3f4f6;font-size:18px;cursor:pointer;text-align:left}.correct{background:#22c55e!important;color:#fff}.wrong{background:#ef4444!important;color:#fff}#explain{display:none;margin-top:18px;padding:16px;background:#faf5ff;border-radius:14px}#next{display:none;margin:20px auto 0;padding:12px 28px;background:#7c3aed;color:#fff;border:none;border-radius:28px;cursor:pointer}#result{display:none;text-align:center}.score{font-size:54px;color:#7c3aed;font-weight:bold}.play{margin-top:20px;padding:14px 30px;border:none;border-radius:28px;background:#22c55e;color:#fff;cursor:pointer}</style></head><body><div class='top'><button class='home' onclick="location.href='https://homepage-gray-omega.vercel.app/'">🏠 Trang chủ</button></div><div class='wrap'><div class='container'><img src='coha-left.png' class='chibi left'><img src='coha-right.png' class='chibi right'><div id='game'><h1>🧠 Cô Hà leo đỉnh Olympia</h1><div class='info'><div>⭐ Điểm: <span id='score'>0</span></div><div>Câu <span id='current'>1</span>/15</div></div><div class='progress'><div class='bar' id='bar'></div></div><div id='question'></div><div class='answers' id='answers'></div><div id='explain'></div><div style='text-align:center'><button id='next'>➡️ Câu tiếp theo</button></div></div><div id='result'><h1>🎉 Hoàn thành</h1><div class='score' id='finalScore'></div><p>Đúng: <span id='correctCount'></span></p><p>Sai: <span id='wrongCount'></span></p><p>Độ chính xác: <span id='accuracy'></span>%</p><button class='play' onclick='startGame()'>🏔️ Leo núi mới</button></div></div></div><script type='module'>import questions from './questions.js';const TOTAL=15;let pool=[],i=0,s=0,c=0,w=0,q=null;const sh=a=>{a=[...a];for(let k=a.length-1;k>0;k--){let j=Math.floor(Math.random()*(k+1));[a[k],a[j]]=[a[j],a[k]]}return a};window.startGame=()=>{pool=sh(questions).slice(0,TOTAL);i=0;s=0;c=0;w=0;game.style.display='block';result.style.display='none';load()};function load(){score.textContent=s;current.textContent=i+1;bar.style.width=(i/TOTAL*100)+'%';explain.style.display='none';next.style.display='none';q=pool[i];question.textContent=q.question||q.q;answers.innerHTML='';sh(q.answers.map((t,x)=>({t,x}))).forEach(o=>{let b=document.createElement('button');b.className='answer';b.textContent=o.t;b.onclick=()=>ck(b,o.x);answers.appendChild(b);});}function ck(b,x){document.querySelectorAll('.answer').forEach(e=>e.disabled=true);if(x===q.correct){b.classList.add('correct');s+=3;c++;}else{b.classList.add('wrong');w++;s=Math.max(0,s-1);document.querySelectorAll('.answer').forEach(e=>{if(e.textContent===q.answers[q.correct])e.classList.add('correct');});}score.textContent=s;explain.innerHTML='<b>💡 Giải thích</b><br><br>'+(q.explain||'');explain.style.display='block';next.style.display='inline-block';}next.onclick=()=>{i++;if(i>=TOTAL){game.style.display='none';result.style.display='block';finalScore.textContent=s+' / 45';correctCount.textContent=c;wrongCount.textContent=w;accuracy.textContent=Math.round(c/TOTAL*100);}else load();};startGame();</script></body></html>
